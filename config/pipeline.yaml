db_root: db
runtime:
  raw_days: 5
  split_days: 1
  raw_api_max: 3
  max_workers: auto
  vehicle_workers: auto
  feature_workers: auto
  mem_per_worker_gb: 4
  cpu_cores: auto
  interval_hours: 0
  schedule_enabled: false
  loop_enabled: false
sources:
  FAB:
    table: RAW_FAB_DATA
    columns:
    - root_lot_id
    - wafer_id
    - part_id
    - tkout_time
    - step_id
    - step_desc
    - ppid
    - reticle_id
    - eqp_id
    - eqp_model
    - chamber_id
    - unit_id
    - sleuth_order
  INLINE:
    table: RAW_INLINE_DATA
    columns:
    - root_lot_id
    - wafer_id
    - item_id
    - value
    - measure_pos
    - time
  VM:
    table: RAW_VM_DATA
    columns:
    - root_lot_id
    - wafer_id
    - sensor_id
    - eqp_id
    - step_id
    - predicted_value
    - actual_value
    - residual
    - time
step_matching: config/step_matching/vehicle_matching.csv
feature_rules:
  fab: config/feature_rules/fab.csv
  knob: config/feature_rules/knob_ppid.csv
  mask: config/feature_rules/mask.csv
  inline: config/feature_rules/inline.csv
  vm: config/feature_rules/vm.csv
unmatched_scan:
  exclude:
    eqp_id:
    - AUX_*
    eqp_model:
    - MEA-*
