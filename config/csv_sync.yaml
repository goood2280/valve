# flow → S3 → Valve csv 설정파일 동기화
# ────────────────────────────────────────────
# flow 가 s3_sync (flow/backend/core/s3_sync.py) 로 올리는 matching csv 들을
# 주기적으로 내려받아 로컬 config 에 반영한다.
#   s3_prefix  flow 업로드 prefix (flow s3_sync.json 의 prefix 와 맞출 것)
#   key        {s3_prefix}/ 이하 S3 key
#   dest       Valve 로컬 저장 경로 (ROOT 기준 상대)
# 알람 탭 › CSV 동기화 섹션에서도 웹으로 관리 가능.
enabled: true
interval_min: 30
s3_prefix: flow/artifacts
files:
  # flow 판정 페이지가 미매칭 step 알람 반영 시 갱신하는 마스터 (vehicle,product,step_id,step_desc)
  - key: matching/Vehicle_matching.csv
    dest: config/step_matching/vehicle_matching.csv
  - key: matching/fab.csv
    dest: config/feature_rules/fab.csv
  # flow 판정 페이지가 RO ppid 알람 반영 시 갱신하는 마스터 룰북 (rule_order 형식)
  - key: matching/ppid_knob.csv
    dest: config/feature_rules/ppid_knob.csv
  - key: matching/mask.csv
    dest: config/feature_rules/mask.csv
  - key: matching/inline_matching.csv
    dest: config/feature_rules/inline.csv
  - key: matching/vm_matching.csv
    dest: config/feature_rules/vm.csv
  - key: matching/scan_ignore_VH_PRODA.json
    dest: config/fab_scan/VH_PRODA/scan_ignore.json
  - key: matching/scan_ignore_VH_PRODB.json
    dest: config/fab_scan/VH_PRODB/scan_ignore.json
