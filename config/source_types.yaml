# Valve source types registry
# ────────────────────────────────────────────
# 소스(DB 종류) 별로 FE/BE 가 공유하는 메타. 추출 대상은 FAB · INLINE · VM 3종.
# 신규 DB 추가 시 여기에 한 블록 붙이고 저장하면
#   · Products 편집기 소스 드롭다운에 노출
#   · /api/schedule/columns 가 해당 소스의 컬럼 풀 반환
#   · Monitor 히트맵 canonical 행에 포함
#   · 가이드 문구(hint) 가 소스 카드 상단에 표시
# Settings › Source types 탭에서도 웹으로 관리 가능 (저장 시 이 파일에 기록).
#
# 필드:
#   name           소스명(대문자). 파티션 폴더/S3 prefix 에 그대로 쓰임.
#   table_template 기본 테이블명 템플릿. {name} 은 실행 시 name 으로 치환.
#   columns        이 소스에서 추출 가능한 컬럼 풀 (Products 편집기 드롭다운).
#   default_shard  신규 소스 추가 시 기본 shard_hierarchy 제안값.
#   accent         hint 박스/히트맵 색상 (HEX).
#   hint           가이드 문구. 빈 값이면 힌트 박스 숨김.
# ────────────────────────────────────────────
source_types:
  - name: FAB
    table_template: "RAW_{name}_DATA"
    columns: [lot_id, wafer_id, root_lot_id, time, eqp_id, eqp_model, recipe_id, ppid, step_id, step_desc, part_id, reticle_id, chamber_id, unit_id, sleuth_order, tkout_time, process_id, line_id, product_code]
    default_shard: []
    accent: "#64748b"
    hint: ""
  - name: INLINE
    table_template: "RAW_{name}_DATA"
    columns: [lot_id, wafer_id, root_lot_id, time, item_id, value, process_id, line_id, measure_pos, product_code]
    default_shard: [root_lot_id]
    accent: "#10b981"
    hint: "INLINE 도 하루치가 크다 — `root_lot_id` probe 로 분포 스캔 후 shard 로 쪼개는 게 기본. 한 root 에 lot 이 많으면 `[root_lot_id, lot_id]` 2단 계층."
  - name: VM
    table_template: "RAW_{name}_DATA"
    columns: [lot_id, wafer_id, root_lot_id, eqp_id, recipe_id, step_id, sensor_id, predicted_value, actual_value, residual, time, process_id, product_code]
    default_shard: []
    accent: "#3b82f6"
    hint: "VM (virtual metrology) — `recipe_id`·`step_id` 로 필터, `residual`(pred-actual) 을 핵심 지표로."
